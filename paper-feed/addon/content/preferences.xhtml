<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
  <html:link
    rel="stylesheet"
    href="chrome://__addonRef__/content/preferences.css"
  />
</linkset>
<groupbox
  class="paperfeed-page-intro"
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })"
>
  <description data-l10n-id="pref-description"></description>
</groupbox>

<groupbox
  class="paperfeed-groupbox paperfeed-card"
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })"
>
  <label>
    <html:h3 data-l10n-id="pref-config-section"></html:h3>
  </label>
  <description data-l10n-id="pref-config-description"></description>

  <hbox align="center">
    <html:label
      for="zotero-prefpane-__addonRef__-profile-name"
      data-l10n-id="pref-profile-name"
    ></html:label>
    <html:input id="zotero-prefpane-__addonRef__-profile-name"></html:input>
  </hbox>

  <vbox>
    <html:label data-l10n-id="pref-journals"></html:label>
    <html:div
      id="zotero-prefpane-__addonRef__-journal-table-shell"
      class="paperfeed-table-shell"
    >
      <html:table
        id="zotero-prefpane-__addonRef__-journal-table"
        class="paperfeed-journal-table"
      >
        <html:colgroup>
          <html:col
            id="zotero-prefpane-__addonRef__-journal-col-name"
          ></html:col>
          <html:col
            id="zotero-prefpane-__addonRef__-journal-col-url"
          ></html:col>
          <html:col class="paperfeed-journal-actions-col"></html:col>
        </html:colgroup>
        <html:thead>
          <html:tr>
            <html:th
              class="paperfeed-journal-resizable"
              data-paperfeed-column="name"
            >
              <html:div
                class="paperfeed-journal-header-label"
                data-l10n-id="pref-journal-name-column"
              ></html:div>
              <html:div
                id="zotero-prefpane-__addonRef__-journal-name-resizer"
                class="paperfeed-column-resizer"
              ></html:div>
            </html:th>
            <html:th data-paperfeed-column="url">
              <html:div
                class="paperfeed-journal-header-label"
                data-l10n-id="pref-journal-url-column"
              ></html:div>
            </html:th>
            <html:th
              class="paperfeed-journal-actions-header"
              data-paperfeed-column="actions"
              data-l10n-id="pref-journal-actions-column"
            ></html:th>
          </html:tr>
        </html:thead>
        <html:tbody id="zotero-prefpane-__addonRef__-journal-rows"></html:tbody>
      </html:table>
    </html:div>
    <html:button
      id="zotero-prefpane-__addonRef__-add-journal-row"
      data-l10n-id="pref-add-journal-row"
      type="button"
    ></html:button>
  </vbox>

  <vbox>
    <html:label
      for="zotero-prefpane-__addonRef__-keyword-table"
      data-l10n-id="pref-keywords"
    ></html:label>
    <html:div
      id="zotero-prefpane-__addonRef__-keyword-table-shell"
      class="paperfeed-table-shell paperfeed-keyword-table-shell"
    >
      <html:table
        id="zotero-prefpane-__addonRef__-keyword-table"
        class="paperfeed-keyword-table"
      >
        <html:colgroup>
          <html:col></html:col>
          <html:col class="paperfeed-journal-actions-col"></html:col>
        </html:colgroup>
        <html:thead>
          <html:tr>
            <html:th data-paperfeed-column="rule">
              <html:div
                class="paperfeed-journal-header-label"
                data-l10n-id="pref-keyword-rule-column"
              ></html:div>
            </html:th>
            <html:th
              class="paperfeed-journal-actions-header"
              data-paperfeed-column="actions"
              data-l10n-id="pref-journal-actions-column"
            ></html:th>
          </html:tr>
        </html:thead>
        <html:tbody id="zotero-prefpane-__addonRef__-keyword-rows"></html:tbody>
      </html:table>
    </html:div>
    <html:button
      id="zotero-prefpane-__addonRef__-add-keyword-row"
      data-l10n-id="pref-add-keyword-row"
      type="button"
    ></html:button>
  </vbox>

  <hbox align="center">
    <html:label
      for="zotero-prefpane-__addonRef__-auto-fetch-enabled"
      data-l10n-id="pref-auto-fetch-enabled"
    ></html:label>
    <html:input
      id="zotero-prefpane-__addonRef__-auto-fetch-enabled"
      type="checkbox"
    ></html:input>
    <html:label
      for="zotero-prefpane-__addonRef__-auto-fetch-interval"
      data-l10n-id="pref-auto-fetch-interval"
    ></html:label>
    <html:input
      id="zotero-prefpane-__addonRef__-auto-fetch-interval"
      type="number"
      min="1"
      step="1"
    ></html:input>
  </hbox>

  <html:div class="paperfeed-subsection">
    <html:h4 data-l10n-id="pref-ai-section"></html:h4>
    <html:p data-l10n-id="pref-ai-description"></html:p>

    <html:div class="paperfeed-form-grid">
      <html:div class="paperfeed-form-row">
        <html:label
          class="paperfeed-form-label"
          for="zotero-prefpane-__addonRef__-ai-enabled"
          data-l10n-id="pref-ai-enabled"
        ></html:label>
        <html:div class="paperfeed-form-control">
          <html:input
            id="zotero-prefpane-__addonRef__-ai-enabled"
            type="checkbox"
          ></html:input>
        </html:div>
      </html:div>
      <html:div class="paperfeed-form-row">
        <html:label
          class="paperfeed-form-label"
          data-l10n-id="pref-ai-schedule"
        ></html:label>
        <html:div class="paperfeed-form-control paperfeed-schedule-control">
          <html:label class="paperfeed-schedule-option">
            <html:input
              id="zotero-prefpane-__addonRef__-ai-schedule-mode-interval"
              name="zotero-prefpane-__addonRef__-ai-schedule-mode"
              type="radio"
              value="interval"
            ></html:input>
            <html:span data-l10n-id="pref-ai-schedule-interval"></html:span>
            <html:input
              id="zotero-prefpane-__addonRef__-ai-schedule-interval-hours"
              class="paperfeed-form-input is-compact"
              type="number"
              min="1"
              step="1"
            ></html:input>
            <html:span
              class="paperfeed-form-unit"
              data-l10n-id="pref-unit-hours"
            ></html:span>
          </html:label>
          <html:label class="paperfeed-schedule-option">
            <html:input
              id="zotero-prefpane-__addonRef__-ai-schedule-mode-daily"
              name="zotero-prefpane-__addonRef__-ai-schedule-mode"
              type="radio"
              value="daily"
            ></html:input>
            <html:span data-l10n-id="pref-ai-schedule-daily"></html:span>
            <html:input
              id="zotero-prefpane-__addonRef__-ai-schedule-daily-time"
              class="paperfeed-form-input is-time"
              type="time"
            ></html:input>
          </html:label>
        </html:div>
      </html:div>
      <html:div class="paperfeed-form-row">
        <html:label
          class="paperfeed-form-label"
          for="zotero-prefpane-__addonRef__-ai-base-url"
          data-l10n-id="pref-ai-base-url"
        ></html:label>
        <html:div class="paperfeed-form-control">
          <html:input
            id="zotero-prefpane-__addonRef__-ai-base-url"
            class="paperfeed-form-input is-wide"
            placeholder="https://api.openai.com/v1"
          ></html:input>
        </html:div>
      </html:div>
      <html:div class="paperfeed-form-row">
        <html:label
          class="paperfeed-form-label"
          for="zotero-prefpane-__addonRef__-ai-api-key"
          data-l10n-id="pref-ai-api-key"
        ></html:label>
        <html:div class="paperfeed-form-control">
          <html:input
            id="zotero-prefpane-__addonRef__-ai-api-key"
            class="paperfeed-form-input is-wide"
            type="password"
          ></html:input>
        </html:div>
      </html:div>
      <html:div class="paperfeed-form-row">
        <html:label
          class="paperfeed-form-label"
          for="zotero-prefpane-__addonRef__-ai-model"
          data-l10n-id="pref-ai-model"
        ></html:label>
        <html:div class="paperfeed-form-control">
          <html:input
            id="zotero-prefpane-__addonRef__-ai-model"
            class="paperfeed-form-input is-wide"
            placeholder="gpt-4o-mini"
          ></html:input>
        </html:div>
      </html:div>
      <html:div class="paperfeed-form-row paperfeed-form-row-stack">
        <html:label
          class="paperfeed-form-label"
          for="zotero-prefpane-__addonRef__-ai-prompt"
          data-l10n-id="pref-ai-prompt"
        ></html:label>
        <html:div class="paperfeed-form-control">
          <html:textarea
            id="zotero-prefpane-__addonRef__-ai-prompt"
            class="paperfeed-form-textarea"
            data-l10n-id="pref-ai-prompt-placeholder"
            data-l10n-attrs="placeholder"
          ></html:textarea>
        </html:div>
      </html:div>
    </html:div>
  </html:div>

  <hbox class="paperfeed-action-toolbar">
    <html:button
      id="zotero-prefpane-__addonRef__-import-config"
      data-l10n-id="pref-import-config"
      type="button"
    ></html:button>
    <html:button
      id="zotero-prefpane-__addonRef__-export-config"
      data-l10n-id="pref-export-config"
      type="button"
    ></html:button>
    <html:button
      id="zotero-prefpane-__addonRef__-save-config"
      data-l10n-id="pref-save-config"
      type="button"
    ></html:button>
    <html:button
      id="zotero-prefpane-__addonRef__-run-fetch"
      data-l10n-id="pref-run-fetch"
      type="button"
    ></html:button>
    <html:button
      id="zotero-prefpane-__addonRef__-refresh-status"
      data-l10n-id="pref-refresh-status"
      type="button"
    ></html:button>
    <html:button
      id="zotero-prefpane-__addonRef__-test-ai"
      data-l10n-id="pref-test-ai"
      type="button"
    ></html:button>
  </hbox>

  <description
    id="zotero-prefpane-__addonRef__-ui-message"
    data-l10n-id="pref-ui-message-idle"
  ></description>
</groupbox>

<groupbox

<groupbox
  class="paperfeed-groupbox paperfeed-card"
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })"
>
  <label>
    <html:h3 data-l10n-id="pref-status-section"></html:h3>
  </label>
  <description data-l10n-id="pref-status-description"></description>

  <html:div class="paperfeed-status-layout">
    <html:dl class="paperfeed-descriptions">
      <html:div class="paperfeed-description-row">
        <html:dt data-l10n-id="pref-server-status"></html:dt>
        <html:dd class="paperfeed-status-value-group">
          <html:span
            id="zotero-prefpane-__addonRef__-server-status"
            class="paperfeed-status-badge is-neutral"
          ></html:span>
          <html:span
            id="zotero-prefpane-__addonRef__-server-status-detail"
            class="paperfeed-status-detail"
          ></html:span>
        </html:dd>
      </html:div>
      <html:div class="paperfeed-description-row">
        <html:dt data-l10n-id="pref-rss-url"></html:dt>
        <html:dd>
          <html:span
            id="zotero-prefpane-__addonRef__-rss-url"
            class="paperfeed-url-value"
          ></html:span>
          <html:button
            id="zotero-prefpane-__addonRef__-copy-rss-url"

            type="button"
          ></html:button>
        </html:dd>
      </html:div>

          <html:button
            id="zotero-prefpane-__addonRef__-copy-ai-rss-url"

        ></html:div>
      </html:div>
      <html:div class="paperfeed-stat-card">
        <html:div
          class="paperfeed-stat-label"
          data-l10n-id="pref-ai-summary-count"
        ></html:div>
        <html:div
          id="zotero-prefpane-__addonRef__-ai-summary-count"
          class="paperfeed-stat-value"
        ></html:div>
      </html:div>
    </html:div>

    <html:div class="paperfeed-error-card">
      <html:div
        class="paperfeed-error-label"
        data-l10n-id="pref-last-error"
      ></html:div>
      <html:pre
        id="zotero-prefpane-__addonRef__-last-error"
        class="paperfeed-error-value"
      ></html:pre>
    </html:div>
  </html:div>
</groupbox>

<vbox class="paperfeed-page-footer">
